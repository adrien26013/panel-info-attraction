<div class="card">
    <h1>DRAKKAR</h1>
    
    <div class="group">
        <label>Capacité (Pers/Heure)</label>
        <input type="number" id="capa">
    </div>

    <div class="group">
        <label>Message à l'écran</label>
        <textarea id="msg" rows="3"></textarea>
    </div>

    <button onclick="envoyer()">Mettre à jour l'attraction</button>

    <div class="group" style="margin-top: 25px; border-top: 1px solid #ddd; padding-top: 20px;">
        <label>Changer Musique Ambiance (.mp3)</label>
        <input type="file" id="musicFile" accept=".mp3">
        <button id="btnUpload" style="background: #34a853; font-size: 14px; padding: 10px;">Uploader la musique</button>
    </div>

    <div id="status" class="status">✅ Opération réussie !</div>
    <p style="font-size: 11px; color: #888; text-align: center;">Touches Test : (S)écurité | (T)echnique | (F)ermeture</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWob3NIJTPxrdpreSpDr__eaPJA2ZCTl0",
        authDomain: "attraction-info.firebaseapp.com",
        databaseURL: "https://attraction-info-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "attraction-info",
        storageBucket: "attraction-info.appspot.com", // Vérifie bien ce lien dans ta console Firebase
        messagingSenderId: "335011135222",
        appId: "1:335011135222:web:db513acd348e55e20c76d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);
    const drakkarRef = ref(db, 'attractions/DRAKKAR');

    // 1. CHARGEMENT AUTOMATIQUE DES DONNÉES EXISTANTES
    onValue(drakkarRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('capa').value = data.capa_heure || 800;
            document.getElementById('msg').value = data.info_message || "";
        }
    });

    // 2. ENVOI DES TEXTES
    window.envoyer = function() {
        update(drakkarRef, {
            capa_heure: parseInt(document.getElementById('capa').value),
            info_message: document.getElementById('msg').value
        }).then(showSuccess);
    }

    // 3. UPLOAD MUSIQUE
    document.getElementById('btnUpload').onclick = function() {
        const file = document.getElementById('musicFile').files[0];
        if(!file) return alert("Choisis un fichier MP3");
        
        this.innerText = "Téléchargement...";
        const musicRef = sRef(storage, 'musique_ambiance_drakkar.mp3');
        
        uploadBytes(musicRef, file).then(() => {
            getDownloadURL(musicRef).then((url) => {
                update(drakkarRef, { music_url: url, update_music: Date.now() });
                this.innerText = "Uploader la musique";
                showSuccess();
            });
        });
    }

    // 4. TOUCHES CLAVIER POUR TEST
    window.addEventListener('keydown', (e) => {
        let cmd = null;
        if(e.key.toLowerCase() === 's') cmd = "SECURITE";
        if(e.key.toLowerCase() === 't') cmd = "TECHNIQUE";
        if(e.key.toLowerCase() === 'f') cmd = "FERMETURE";
        
        if(cmd) {
            update(drakkarRef, { commande_test: cmd, trigger_time: Date.now() });
            showSuccess();
        }
    });

    function showSuccess() {
        const status = document.getElementById('status');
        status.style.display = 'block';
        setTimeout(() => { status.style.display = 'none'; }, 3000);
    }
</script>
