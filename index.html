<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Drakkar - Gestion Attraction</title>
    <style>
        :root {
            --primary: #1a73e8;
            --secondary: #34a853;
            --bg: #f0f2f5;
            --dark: #202124;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 450px; 
        }

        h1 { 
            color: var(--dark); 
            text-align: center; 
            margin-top: 0;
            margin-bottom: 30px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            font-size: 24px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .group { margin-bottom: 25px; }

        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 600; 
            color: #5f6368; 
            font-size: 14px;
        }

        input[type="number"], textarea { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
            transition: all 0.3s ease; 
            background: #f8f9fa;
        }

        input:focus, textarea:focus { 
            border-color: var(--primary); 
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
        }

        button { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s; 
            box-shadow: 0 4px 6px rgba(26, 115, 232, 0.2);
        }

        button:hover { 
            background: #1557b0; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 12px rgba(26, 115, 232, 0.3);
        }

        /* Section Musique */
        .music-section {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px dashed #ddd;
        }

        input[type="file"] {
            font-size: 13px;
            margin-bottom: 10px;
            color: #5f6368;
        }

        .btn-upload {
            background: var(--secondary);
            box-shadow: 0 4px 6px rgba(52, 168, 83, 0.2);
            font-size: 14px;
            padding: 12px;
        }

        .btn-upload:hover { background: #2d9249; box-shadow: 0 6px 12px rgba(52, 168, 83, 0.3); }

        .status { 
            margin-top: 20px; 
            text-align: center; 
            color: var(--secondary); 
            font-weight: bold; 
            display: none; 
            padding: 10px;
            background: #e6f4ea;
            border-radius: 8px;
        }

        .shortcuts {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #9aa0a6;
        }

        kbd {
            background: #eee;
            border-radius: 3px;
            padding: 2px 6px;
            border: 1px solid #ccc;
            color: #333;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Le Drakkar</h1>
    
    <div class="group">
        <label>Capacité horaire (personnes/h)</label>
        <input type="number" id="capa" placeholder="Ex: 800">
    </div>

    <div class="group">
        <label>Message informatif écran</label>
        <textarea id="msg" rows="3" placeholder="Tapez votre message ici..."></textarea>
    </div>

    <button onclick="envoyer()">METTRE À JOUR L'ÉCRAN</button>

    <div class="music-section">
        <label>Nouvelle bande son (.mp3)</label>
        <input type="file" id="musicFile" accept=".mp3">
        <button id="btnUpload" class="btn-upload">CHANGER LA MUSIQUE</button>
    </div>

    <div id="status" class="status">✅ Synchronisation terminée !</div>
    
    <div class="shortcuts">
        Tests distance : <kbd>S</kbd> Sécu | <kbd>T</kbd> Tech | <kbd>F</kbd> Fermeture
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWob3NIJTPxrdpreSpDr__eaPJA2ZCTl0",
        authDomain: "attraction-info.firebaseapp.com",
        databaseURL: "https://attraction-info-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "attraction-info",
        storageBucket: "attraction-info.appspot.com",
        messagingSenderId: "335011135222",
        appId: "1:335011135222:web:db513acd348e55e20c76d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);
    const drakkarRef = ref(db, 'attractions/DRAKKAR');

    // Récupération automatique des données pour ne pas avoir les cases vides ou par défaut
    onValue(drakkarRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            if (!document.activeElement || document.activeElement.id !== 'capa') 
                document.getElementById('capa').value = data.capa_heure || "";
            if (!document.activeElement || document.activeElement.id !== 'msg')
                document.getElementById('msg').value = data.info_message || "";
        }
    });

    window.envoyer = function() {
        update(drakkarRef, {
            capa_heure: parseInt(document.getElementById('capa').value),
            info_message: document.getElementById('msg').value
        }).then(showSuccess);
    }

    document.getElementById('btnUpload').onclick = function() {
        const file = document.getElementById('musicFile').files[0];
        if(!file) return alert("Veuillez choisir un fichier MP3.");
        
        const originalText = this.innerText;
        this.innerText = "CHARGEMENT...";
        this.disabled = true;

        const musicRef = sRef(storage, 'musique_ambiance_drakkar.mp3');
        
        uploadBytes(musicRef, file).then(() => {
            getDownloadURL(musicRef).then((url) => {
                update(drakkarRef, { 
                    music_url: url, 
                    update_trigger: Date.now() 
                });
                this.innerText = originalText;
                this.disabled = false;
                showSuccess();
            });
        }).catch(err => {
            alert("Erreur upload: " + err.message);
            this.innerText = originalText;
            this.disabled = false;
        });
    }

    // Touches clavier pour tests
    window.addEventListener('keydown', (e) => {
        if (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA") return;
        
        let cmd = null;
        const key = e.key.toLowerCase();
        if(key === 's') cmd = "SECURITE";
        if(key === 't') cmd = "TECHNIQUE";
        if(key === 'f') cmd = "FERMETURE";
        
        if(cmd) {
            update(drakkarRef, { commande_test: cmd, trigger_time: Date.now() });
            showSuccess();
        }
    });

    function showSuccess() {
        const status = document.getElementById('status');
        status.style.display = 'block';
        setTimeout(() => { status.style.display = 'none'; }, 3000);
    }
</script>

</body>
</html>
